<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Browse World Cup matches without seeing results."
    />
    <title>World Cup, Spoiler Safe</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Spoiler-free</p>
        <h1>World Cup Tracker</h1>
        <p>
          Every match, no surprises. Results stay hidden until you choose how
          much to see, match by match.
        </p>
      </div>
    </header>

    <main class="page">
      <section class="toolbar" aria-label="Match controls">
        <div class="toolbar__intro">
          <h2>Matches</h2>
          <p id="summary">Loading fixtures...</p>
          <div class="status-filter" aria-label="Filter by match status">
            <button class="status-filter__button is-active" type="button" data-status="all" aria-pressed="true">
              All
            </button>
            <button class="status-filter__button" type="button" data-status="upcoming" aria-pressed="false">
              Upcoming
            </button>
            <button class="status-filter__button" type="button" data-status="finished" aria-pressed="false">
              Finished
            </button>
          </div>
        </div>
        <div class="toolbar__actions">
          <label class="date-filter">
            <span>Match date</span>
            <select id="date-filter" disabled>
              <option value="all">All dates</option>
            </select>
          </label>
          <button id="refresh-button" class="button button--secondary" type="button">
            Refresh
          </button>
        </div>
      </section>

      <div id="message" class="message" role="status" hidden></div>
      <div id="matches" class="match-list" aria-live="polite"></div>
    </main>

    <dialog id="spoiler-dialog">
      <form method="dialog" class="dialog">
        <p class="eyebrow">Spoiler warning</p>
        <h2>Reveal the full result?</h2>
        <p>
          This will reveal the score, winner, teams involved in events, and
          player names. Are you sure?
        </p>
        <div class="dialog__actions">
          <button class="button button--secondary" value="cancel">Keep hidden</button>
          <button id="confirm-reveal" class="button button--danger" value="confirm">
            Reveal spoilers
          </button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" defer></script>
  </body>
</html>
